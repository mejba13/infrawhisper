name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/infrawhisper

jobs:
  build-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: api-server
            dockerfile: Dockerfile.api-server
            context: .
          - name: collector
            dockerfile: Dockerfile.collector
            context: .
          - name: stream-processor
            dockerfile: Dockerfile.stream-processor
            context: .
          - name: ai-engine
            dockerfile: ai-engine/Dockerfile
            context: ./ai-engine
          - name: dashboard
            dockerfile: dashboard/Dockerfile
            context: ./dashboard
          - name: agent
            dockerfile: agent/Dockerfile
            context: ./agent
    steps:
      - uses: actions/checkout@v4

      - name: Install librdkafka (for Go CGO builds)
        if: "!contains(matrix.service.name, 'ai-engine') && !contains(matrix.service.name, 'dashboard') && !contains(matrix.service.name, 'agent')"
        run: sudo apt-get install -y librdkafka-dev

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-package:
    name: Package and publish Helm chart
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Update chart appVersion
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/infrawhisper/Chart.yaml
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/helm/infrawhisper/Chart.yaml

      - name: Package chart
        run: helm package deploy/helm/infrawhisper/ -d /tmp/charts/

      - name: Push chart to GHCR OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push /tmp/charts/*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
