apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "infrawhisper.labels" . | nindent 4 }}
spec:
  type: {{ .Values.apiServer.service.type }}
  selector:
    app: api-server
  ports:
    - name: http
      port: {{ .Values.apiServer.service.port }}
      targetPort: http
